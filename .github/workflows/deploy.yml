name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          script: |
            cd ~/mgs-survey
            
            # CRITICAL: Backup live database before pulling
            echo "Backing up live database..."
            cp dev.db dev.db.backup || echo "No dev.db to backup"
            cp prisma/dev.db prisma/dev.db.backup || true
            
            # Stash any local changes that prevent pulling (i.e. git-tracked DB changes)
            git config --global user.email "deploy@example.com"
            git config --global user.name "Deploy Action"
            git stash || echo "Nothing to stash"
            
            git pull origin main
            
            # CRITICAL: Restore the live database immediately
            echo "Restoring live database..."
            cp dev.db.backup dev.db || echo "No backup restored for dev.db"
            cp prisma/dev.db.backup prisma/dev.db || true
            
            
            # Inject environment variables into .env
            echo "DATABASE_URL=\"file:./dev.db\"" > .env
            echo "RESEND_API_KEY=\"${{ secrets.RESEND_API_KEY }}\"" >> .env
            echo "NEXT_PUBLIC_APP_URL=\"${{ secrets.NEXT_PUBLIC_APP_URL }}\"" >> .env
            echo "AUTH_SECRET=\"${{ secrets.AUTH_SECRET }}\"" >> .env
            
            npm install --production=false
            npx prisma generate
            npx prisma db push --accept-data-loss
            
            # Create a deployment status file in the public directory
            echo "Last Deployment: $(date)" > public/deploy-status.txt
            echo "Commit: $(git rev-parse HEAD)" >> public/deploy-status.txt
            echo "Branch: main" >> public/deploy-status.txt
            
            npm run build
            pm2 restart all || pm2 start npm --name "survey-app" -- start
            pm2 save
